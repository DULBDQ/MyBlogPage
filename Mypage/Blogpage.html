<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<style>
/* --- General styles --- */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
body { background: linear-gradient(135deg, #ffccd5, #fff9c4, #ffffff); min-height: 100vh; color: #000; }

/* --- Top bar --- */
.topbar {
  position: fixed; top: 0; left: 0; width: 100%; height: 60px;
  background: #8B0000; display: flex; align-items: center; justify-content: space-between;
  padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;
}
.logo-image { height: 100%; width: 80px; object-fit: cover; }
.circle-image { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid #000; cursor: pointer; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.search-bar input { padding: 5px 10px; border-radius: 20px; border: 1px solid #000; outline: none; }
.burger { width: 30px; height: 25px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
.burger div { height: 4px; background: #000; border-radius: 2px; }

/* --- Dropdown Menus --- */
.dropdown { position: absolute; top: 60px; right: 15px; background: #fff; border: 1px solid #000;
  border-radius: 8px; display: none; flex-direction: column; min-width: 140px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1001; }
.dropdown a { padding: 10px 15px; text-decoration: none; color: #000; }
.dropdown a:hover { background: #f0f0f0; }

/* --- Profile Card --- */
.profile-card { position: absolute; top: 60px; right: 70px; width: 250px; border-radius: 12px; display: none; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 1002; overflow: hidden; }
.card-top-bar { height: 70px; background: #2196F3; position: relative; }
.profile-pic-top { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #000; position: absolute; right: 10px; bottom: -30px; object-fit: cover; }
.card-bio { background: linear-gradient(135deg, #ffccd5, #fff9c4); padding: 40px 10px 15px 10px; text-align: center; }
.card-bio .name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
.card-bio .bio { font-size: 14px; color: #000; }

/* --- Main Content --- */
.main-content { margin-top: 80px; text-align: center; }
.main-center-image { width: 300px; height: auto; max-width: 90%; margin: 0 auto; display: block; }
.separator { width: 80%; height: 2px; background: #000; margin: 20px auto; border-radius: 1px; }

/* --- Service Options Container --- */
#service-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.service-option { width: 200px; text-align: center; }
.service-option img { width: 100%; height: auto; border-radius: 15px; border: 2px solid #000; display: block; margin-bottom: 10px; }
.service-option .service-name { font-size: 16px; font-weight: bold; }
.service-option a { text-decoration: none; color: inherit; display: block; }

/* --- Responsive --- */
@media (max-width: 600px) {
  .logo-image { width: 60px; }
  .circle-image { height: 30px; width: 30px; }
  .main-center-image { width: 200px; }
  .service-option { width: 150px; }
  .profile-card { right: 50px; width: 200px; }
  .profile-pic-top { width: 50px; height: 50px; bottom: -25px; }
}
</style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <img src="https://files.catbox.moe/enxftx.png" alt="Logo" class="logo-image">
    <div class="topbar-right">
      <img src="https://files.catbox.moe/vtrspj.png" alt="Profile" class="circle-image" onclick="toggleProfile()">
      <div class="search-bar"><input type="text" placeholder="Search..."></div>
      <div class="burger" onclick="toggleDropdown()"><div></div><div></div><div></div></div>
    </div>
    <div class="dropdown" id="dropdown-menu">
      <a href="#">Help</a>
      <a href="#">Pages/About</a>
    </div>
  </div>

  <!-- Profile Card -->
  <div class="profile-card" id="profile-card">
    <div class="card-top-bar">
      <img src="https://files.catbox.moe/vtrspj.png" alt="Profile Pic" class="profile-pic-top">
    </div>
    <div class="card-bio">
      <div class="name">Your Name</div>
      <div class="bio">This is a short bio for your profile.</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <img src="https://files.catbox.moe/ig9r64.png" alt="Center Big" class="main-center-image">
    <div class="separator"></div>

    <!-- Service Options Container -->
    <div id="service-container">
      <!-- Services will load dynamically from JSON -->
    </div>
  </div>

  <script>
    /* Dropdown and profile toggle */
    function toggleDropdown() {
      const menu = document.getElementById('dropdown-menu');
      menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }
    function toggleProfile() {
      const card = document.getElementById('profile-card');
      card.style.display = card.style.display === 'flex' ? 'none' : 'flex';
    }
    window.addEventListener('click', function(e) {
      const menu = document.getElementById('dropdown-menu');
      const burger = document.querySelector('.burger');
      const profile = document.querySelector('.circle-image');
      const card = document.getElementById('profile-card');
      if (!menu.contains(e.target) && !burger.contains(e.target)) { menu.style.display = 'none'; }
      if (!card.contains(e.target) && !profile.contains(e.target)) { card.style.display = 'none'; }
    });

    /* --- Load services from posts.json --- */
    fetch('posts.json')
      .then(response => response.json())
      .then(posts => {
        const container = document.getElementById('service-container');
        posts.forEach(post => {
          const div = document.createElement('div');
          div.className = 'service-option';
          div.innerHTML = `
            <a href="${post.link}" target="_blank">
              <img src="${post.image}" alt="${post.title}">
              <div class="service-name">${post.title}</div>
            </a>
          `;
          container.appendChild(div);
        });
      })
      .catch(err => console.error("Failed to load posts.json:", err));
  </script>
</body>
</html>
